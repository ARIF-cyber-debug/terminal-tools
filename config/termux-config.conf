# Termux Specific Configuration

# Storage permissions
allow_external_storage=true
allow_storage_access=true

# Optimization
enable_swap=true
swap_size=1024

# Wake lock
enable_wake_lock=false

# Volume keys
volume_key_functions=true

# Terminal bell
bell_enabled=false

# Cursor
cursor_blink_rate=0

# Font
font_size=12
font_family=monospace

# Color scheme
color_scheme=dark

# Keyboard
keyboard_height=300
extra_keys_enabled=true

# Shortcuts
shortcut_create_new_session=Volume Down + n
shortcut_next_session=Volume Down + Right
shortcut_previous_session=Volume Down + Left
shortcut_rename_session=Volume Down + Shift + n
