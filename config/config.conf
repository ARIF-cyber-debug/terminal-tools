# CANGCUT Configuration File
# Edit file ini untuk mengatur preferensi global

# Colors
ENABLE_COLORS=true

# Logging
ENABLE_LOGGING=true
LOG_DIR=$HOME/.cangcut/logs

# Default values
DEFAULT_TIMEOUT=30
DEFAULT_RETRIES=3

# Network
NETWORK_INTERFACE=auto
DNS_SERVER=8.8.8.8

# Security
CRYPT_METHOD=aes-256-cbc
HASH_METHOD=sha256

# Performance
THREADS=4
MAX_MEMORY_MB=1024

# Backup
BACKUP_LOCATION=$HOME/.cangcut/backups
BACKUP_COMPRESSION=gzip

# Termux specific
TERMUX_OPTIMIZATION=true
AUTO_CLEANUP=true
